<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clean Stream</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        /* Mobile adjustment: crops top header titles cleanly */
        .video-container iframe {
            position: absolute;
            top: -55px;    
            left: -5px;
            width: calc(100% + 10px);
            height: calc(100% + 110px); 
            border: none;
        }
        #interaction-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.01);
        }
    </style>
</head>
<body>
    <div id="interaction-overlay"></div>
    <div class="video-container" id="stream-wrapper">
        <iframe 
            id="live-player"
            src="https://www.youtube.com/embed/QOXPhLT9zU4?autoplay=1&controls=0&mute=1" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>
    <script>
        const overlay = document.getElementById('interaction-overlay');
        const player = document.getElementById('live-player');
        overlay.addEventListener('click', () => {
            player.src = "https://www.youtube.com/embed/QOXPhLT9zU4?autoplay=1&controls=0&mute=0";
            overlay.remove();
        });
    </script>
</body>
</html>
